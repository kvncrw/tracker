services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  garage:
    image: dxflrs/garage:v1.0.0
    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # RPC
      - "3902:3902"   # admin
    volumes:
      - garage_data:/var/lib/garage
      - ./docker/garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3902/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  garage_data:
