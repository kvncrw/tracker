apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker-worker
  namespace: tracker
  labels:
    app.kubernetes.io/name: tracker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tracker
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tracker
        app.kubernetes.io/component: worker
    spec:
      volumes:
        - name: holdings
          configMap:
            name: tracker-holdings
        - name: schwab-token
          secret:
            secretName: tracker-schwab-token
      containers:
        - name: worker
          image: harbor.example.com/tracker/tracker-backend:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: holdings
              mountPath: /app/data/holdings.json
              subPath: holdings.json
              readOnly: true
            - name: schwab-token
              mountPath: /etc/schwab
              readOnly: true
          command:
            - python
            - -m
            - apps.worker
          env:
            # Scheduled jobs run as discrete k8s CronJobs (see cronjobs.yaml).
            # The worker process keeps only the continuous outbox-relay loop;
            # the in-process APScheduler stays off so jobs don't double-fire.
            - name: WORKER_SCHEDULE
              value: "false"
          envFrom:
            - secretRef:
                name: tracker-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
