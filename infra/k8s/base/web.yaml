apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker-web
  namespace: tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracker-web
  template:
    metadata:
      labels:
        app: tracker-web
    spec:
      containers:
        - name: web
          image: harbor.example.com/tracker/tracker-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tracker-web
  namespace: tracker
spec:
  selector:
    app: tracker-web
  ports:
    - port: 3001
