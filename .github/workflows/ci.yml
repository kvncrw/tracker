name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: tracker
          POSTGRES_USER: tracker
          POSTGRES_DB: tracker_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tracker"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://tracker:tracker@localhost:5432/tracker_test
      BROKER_MODE: fake
      ALLOW_LIVE_TRADING: "false"
      VCR_RECORD_MODE: none
      PYTEST_DISABLE_SOCKET: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --all-extras
      - run: uv run alembic upgrade head
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src apps
      - run: uv run pytest tests/domain tests/application -q
      - run: uv run pytest tests/adapters/contracts -q
      - run: uv run pytest tests/adapters --disable-socket -q
      - run: uv run pytest tests/apps tests/e2e -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - run: corepack enable
      - run: pnpm --dir web install --frozen-lockfile
        continue-on-error: true   # web/ scaffolded later; fail soft until then
      - run: pnpm --dir web lint
        continue-on-error: true
      - run: pnpm --dir web typecheck
        continue-on-error: true

  build-image:
    runs-on: ubuntu-latest
    needs: [python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/tracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
